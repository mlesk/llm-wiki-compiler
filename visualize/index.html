<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki Knowledge Graph</title>
<style>
  :root {
    --bg-primary: #09090b;
    --bg-secondary: #0f0f12;
    --bg-tertiary: #18181b;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #52525b;
    --border: rgba(255,255,255,0.06);
    --accent: #6366f1;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  canvas { display:block; position:absolute; top:0; left:0; }

  /* HUD Elements */
  .hud {
    position: fixed;
    z-index: 10;
    background: rgba(9,9,11,0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    pointer-events: auto;
  }
  .hud-stats {
    top: 20px; left: 20px;
  }
  .hud-stats h1 {
    font-size: 16px; font-weight: 600; margin-bottom: 4px;
    background: linear-gradient(135deg, #a78bfa, #6366f1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hud-stats .meta {
    font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px;
  }

  .hud-search {
    top: 20px; right: 20px;
  }
  .hud-search input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text-primary);
    font-size: 13px;
    width: 200px;
    outline: none;
  }
  .hud-search input::placeholder { color: var(--text-muted); }
  .hud-search input:focus { border-color: rgba(99,102,241,0.4); }

  .hud-legend {
    bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-secondary);
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  /* Article Panel */
  .panel {
    position: fixed;
    top: 0; right: 0;
    width: 420px; height: 100vh;
    background: rgba(9,9,11,0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-left: 1px solid var(--border);
    z-index: 20;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    overflow-y: auto;
    padding: 24px;
  }
  .panel.open { transform: translateX(0); }
  .panel-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--text-muted);
    font-size: 20px; cursor: pointer; padding: 4px 8px;
    border-radius: 6px;
  }
  .panel-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
  .panel h2 {
    font-size: 20px; font-weight: 600; margin-bottom: 6px;
    padding-right: 36px;
  }
  .panel .panel-meta {
    font-size: 11px; color: var(--text-muted); margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .panel .section { margin-bottom: 20px; }
  .panel .section-heading {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  }
  .coverage-badge {
    font-size: 10px; font-weight: 500; padding: 2px 6px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .coverage-high { background: rgba(34,197,94,0.15); color: #4ade80; }
  .coverage-medium { background: rgba(234,179,8,0.15); color: #facc15; }
  .coverage-low { background: rgba(239,68,68,0.15); color: #f87171; }
  .panel .section-content {
    font-size: 13px; line-height: 1.7; color: var(--text-secondary);
  }
  .panel .section-content code {
    background: rgba(255,255,255,0.06); padding: 1px 5px;
    border-radius: 3px; font-size: 12px;
  }
  .panel .section-content li { margin-bottom: 4px; }
  .panel .section-content ul { padding-left: 18px; }

  /* Tooltip */
  .tooltip {
    position: fixed; z-index: 30;
    background: rgba(15,15,18,0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 260px;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip .tt-name { font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
  .tooltip .tt-detail { color: var(--text-muted); font-size: 11px; }
</style>
</head>
<body>

<canvas id="graph"></canvas>

<div class="hud hud-stats" id="hudStats">
  <h1 id="wikiName">Loading...</h1>
  <div class="meta" id="wikiMeta"></div>
</div>

<div class="hud hud-search">
  <input type="text" id="searchInput" placeholder="Search topics..." autocomplete="off">
</div>

<div class="hud hud-legend" id="legend"></div>

<div class="panel" id="panel">
  <button class="panel-close" id="panelClose">&times;</button>
  <h2 id="panelTitle"></h2>
  <div class="panel-meta" id="panelMeta"></div>
  <div id="panelContent"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-detail" id="ttDetail"></div>
</div>

<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const panel = document.getElementById('panel');

// Color palette (indigo-weighted, adapted for dark bg)
const PALETTE = [
  '#818cf8', '#a78bfa', '#f472b6', '#34d399', '#fbbf24',
  '#fb923c', '#38bdf8', '#e879f9', '#4ade80', '#f87171',
  '#22d3ee', '#a3e635'
];

let W, H, centerX, centerY;
let nodes = [];
let edges = [];
let concepts = [];
let graphData = null;
let hoveredNode = null;
let hoveredEdge = null;
let selectedNode = null;
let searchQuery = '';
let animFrame;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  centerX = W / 2;
  centerY = H / 2;
  if (panel.classList.contains('open')) {
    centerX = (W - 420) / 2;
  }
  layoutNodes();
}

// --- Data Loading ---

async function loadData() {
  const res = await fetch('/api/graph');
  graphData = await res.json();

  document.getElementById('wikiName').textContent = graphData.name;
  document.getElementById('wikiMeta').textContent =
    `${graphData.topics.length} topics · ${graphData.totalSources || '?'} sources`;

  // Build nodes
  const maxSources = Math.max(...graphData.topics.map(t => t.sourceCount), 1);
  nodes = graphData.topics.map((t, i) => ({
    slug: t.slug,
    name: t.name,
    aliases: t.aliases,
    sourceCount: t.sourceCount,
    color: PALETTE[i % PALETTE.length],
    radius: Math.min(10 + Math.sqrt(t.sourceCount) * 5, 50),
    angle: 0, targetDist: 0,
    x: centerX, y: centerY,
    targetX: centerX, targetY: centerY
  }));

  // Build edges
  edges = graphData.edges.map(e => ({
    from: e.from, to: e.to, concept: e.concept
  }));

  concepts = graphData.concepts;

  // Build legend
  const legend = document.getElementById('legend');
  legend.innerHTML = nodes.map(n =>
    `<div class="legend-item"><div class="legend-dot" style="background:${n.color}"></div>${n.name}</div>`
  ).join('');

  layoutNodes();
  animate();
}

// --- Layout ---

function layoutNodes() {
  if (!nodes.length) return;
  const padding = 80;
  const minDist = Math.max(Math.min(W, H) * 0.12, 60);
  const maxDist = Math.min(W, H) * 0.36;

  // Connection count per node
  const connCount = {};
  nodes.forEach(n => { connCount[n.slug] = 0; });
  edges.forEach(e => {
    if (connCount[e.from] !== undefined) connCount[e.from]++;
    if (connCount[e.to] !== undefined) connCount[e.to]++;
  });
  const maxConn = Math.max(...Object.values(connCount), 1);

  const angleStep = (2 * Math.PI) / nodes.length;

  nodes.forEach((n, i) => {
    const conn = connCount[n.slug] || 0;
    // More connections → closer to center
    n.targetDist = minDist + (maxDist - minDist) * (1 - conn / maxConn) * 0.7 + minDist * 0.3;
    n.angle = -Math.PI / 2 + angleStep * i;
    n.targetX = centerX + Math.cos(n.angle) * n.targetDist;
    n.targetY = centerY + Math.sin(n.angle) * n.targetDist;
  });
}

// --- Animation ---

function animate() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawEdges();
  drawNodes();
  drawCenter();

  // Lerp positions
  nodes.forEach(n => {
    n.x += (n.targetX - n.x) * 0.06;
    n.y += (n.targetY - n.y) * 0.06;
  });

  animFrame = requestAnimationFrame(animate);
}

function drawBackground() {
  const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W, H) * 0.5);
  grad.addColorStop(0, '#0d0d10');
  grad.addColorStop(1, '#09090b');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawCenter() {
  // Soft glow at center
  const cGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 40);
  cGrad.addColorStop(0, 'rgba(99,102,241,0.08)');
  cGrad.addColorStop(1, 'rgba(99,102,241,0)');
  ctx.fillStyle = cGrad;
  ctx.beginPath();
  ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
  ctx.fill();

  // Center dot
  ctx.fillStyle = 'rgba(99,102,241,0.4)';
  ctx.beginPath();
  ctx.arc(centerX, centerY, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawEdges() {
  edges.forEach(e => {
    const fromNode = nodes.find(n => n.slug === e.from);
    const toNode = nodes.find(n => n.slug === e.to);
    if (!fromNode || !toNode) return;

    const isHovered = hoveredEdge === e ||
      (hoveredNode && (hoveredNode.slug === e.from || hoveredNode.slug === e.to));
    const isSearchDimmed = searchQuery &&
      !fromNode.name.toLowerCase().includes(searchQuery) &&
      !toNode.name.toLowerCase().includes(searchQuery);

    ctx.save();
    ctx.globalAlpha = isSearchDimmed ? 0.03 : (isHovered ? 0.35 : 0.08);
    ctx.strokeStyle = isHovered ? '#818cf8' : '#a1a1aa';
    ctx.lineWidth = isHovered ? 2 : 1;

    // Curved edge (quadratic bezier through center offset)
    const mx = (fromNode.x + toNode.x) / 2;
    const my = (fromNode.y + toNode.y) / 2;
    const dx = toNode.x - fromNode.x;
    const dy = toNode.y - fromNode.y;
    const cpx = mx + dy * 0.15;
    const cpy = my - dx * 0.15;

    ctx.beginPath();
    ctx.moveTo(fromNode.x, fromNode.y);
    ctx.quadraticCurveTo(cpx, cpy, toNode.x, toNode.y);
    ctx.stroke();

    // Edge label (concept name) at midpoint
    if (isHovered) {
      const concept = concepts.find(c => c.slug === e.concept);
      if (concept) {
        const lx = (fromNode.x + cpx + toNode.x) / 3;
        const ly = (fromNode.y + cpy + toNode.y) / 3;
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#a1a1aa';
        ctx.font = '10px -apple-system, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(concept.name, lx, ly - 4);
      }
    }
    ctx.restore();
  });
}

function drawNodes() {
  const time = Date.now();

  nodes.forEach(n => {
    const isHovered = hoveredNode === n;
    const isSelected = selectedNode === n;
    const isSearchMatch = !searchQuery || n.name.toLowerCase().includes(searchQuery) ||
      (n.aliases && n.aliases.toLowerCase().includes(searchQuery));
    const isConnected = hoveredNode && edges.some(
      e => (e.from === hoveredNode.slug && e.to === n.slug) ||
           (e.to === hoveredNode.slug && e.from === n.slug)
    );

    ctx.save();

    // Dim non-matching nodes during search
    if (searchQuery && !isSearchMatch) {
      ctx.globalAlpha = 0.1;
    } else if (hoveredNode && !isHovered && !isConnected) {
      ctx.globalAlpha = 0.35;
    } else {
      ctx.globalAlpha = 1;
    }

    // Glow
    if (isHovered || isSelected) {
      ctx.shadowBlur = 25;
      ctx.shadowColor = n.color;
    }

    // Pulse for selected
    let r = n.radius;
    if (isSelected) {
      r += Math.sin(time * 0.004) * 2;
    }

    // Node circle
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r);
    grad.addColorStop(0, n.color);
    grad.addColorStop(1, hexAlpha(n.color, 0.6));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fill();

    // Border
    ctx.strokeStyle = hexAlpha(n.color, isHovered ? 0.8 : 0.3);
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.stroke();

    // Label
    ctx.shadowBlur = 0;
    ctx.fillStyle = (isSearchMatch || !searchQuery) ? '#fafafa' : '#52525b';
    ctx.font = `${isHovered ? '600' : '500'} ${r > 25 ? 12 : 11}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(n.name, n.x, n.y + r + 8);

    // Source count badge
    if (r > 15) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.font = '600 10px -apple-system, system-ui, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.sourceCount, n.x, n.y);
    }

    // Connection line to center (very faint)
    ctx.globalAlpha *= 0.04;
    ctx.strokeStyle = n.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(n.x, n.y);
    ctx.stroke();

    ctx.restore();
  });
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// --- Interaction ---

canvas.addEventListener('mousemove', (e) => {
  const mx = e.clientX, my = e.clientY;
  let found = null;
  let foundEdge = null;

  // Check nodes
  for (const n of nodes) {
    const dist = Math.sqrt((mx - n.x) ** 2 + (my - n.y) ** 2);
    if (dist < n.radius + 8) { found = n; break; }
  }

  // Check edges if no node found
  if (!found) {
    for (const e of edges) {
      const fromN = nodes.find(n => n.slug === e.from);
      const toN = nodes.find(n => n.slug === e.to);
      if (!fromN || !toN) continue;
      // Simple midpoint proximity check
      const emx = (fromN.x + toN.x) / 2;
      const emy = (fromN.y + toN.y) / 2;
      const dist = Math.sqrt((mx - emx) ** 2 + (my - emy) ** 2);
      if (dist < 30) { foundEdge = e; break; }
    }
  }

  hoveredNode = found;
  hoveredEdge = foundEdge;
  canvas.style.cursor = (found || foundEdge) ? 'pointer' : 'default';

  // Tooltip
  if (found) {
    document.getElementById('ttName').textContent = found.name;
    document.getElementById('ttDetail').textContent =
      `${found.sourceCount} sources · Click to read article`;
    tooltip.style.left = (mx + 16) + 'px';
    tooltip.style.top = (my - 10) + 'px';
    tooltip.classList.add('visible');
  } else if (foundEdge) {
    const concept = concepts.find(c => c.slug === foundEdge.concept);
    document.getElementById('ttName').textContent = concept ? concept.name : foundEdge.concept;
    document.getElementById('ttDetail').textContent = 'Click to read concept article';
    tooltip.style.left = (mx + 16) + 'px';
    tooltip.style.top = (my - 10) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('click', async (e) => {
  if (hoveredNode) {
    selectedNode = hoveredNode;
    await openArticle('topic', hoveredNode.slug);
  } else if (hoveredEdge) {
    await openArticle('concept', hoveredEdge.concept);
  } else if (panel.classList.contains('open')) {
    closePanel();
  }
});

// --- Panel ---

async function openArticle(type, slug) {
  const res = await fetch(`/api/${type}/${slug}`);
  if (!res.ok) return;
  const article = await res.json();

  document.getElementById('panelTitle').textContent = article.title;
  document.getElementById('panelMeta').textContent =
    `${article.meta.source_count || '?'} sources · ${article.meta.last_compiled || ''}`;

  const content = document.getElementById('panelContent');
  content.innerHTML = article.sections.map(s => {
    const coverageMatch = s.heading.match(/\[coverage:\s*(high|medium|low)\s*--\s*(\d+)\s*sources?\]/i);
    let badge = '';
    let heading = s.heading;
    if (coverageMatch) {
      const level = coverageMatch[1].toLowerCase();
      badge = `<span class="coverage-badge coverage-${level}">${level}</span>`;
      heading = s.heading.replace(/\[coverage:.*?\]/i, '').trim();
    }
    return `
      <div class="section">
        <div class="section-heading">${heading} ${badge}</div>
        <div class="section-content">${markdownToHtml(s.content)}</div>
      </div>`;
  }).join('');

  panel.classList.add('open');
  centerX = (W - 420) / 2;
  layoutNodes();
}

function closePanel() {
  panel.classList.remove('open');
  selectedNode = null;
  centerX = W / 2;
  layoutNodes();
}

document.getElementById('panelClose').addEventListener('click', closePanel);

// --- Simple Markdown → HTML ---

function markdownToHtml(md) {
  return md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^- \*\*(.+?)\*\*\s*[—–-]\s*(.+)$/gm, '<li><strong>$1</strong> — $2</li>')
    .replace(/^- \*\*(.+?)\*\*\s*\((.+?)\)\s*[—–-]\s*(.+)$/gm, '<li><strong>$1</strong> ($2) — $3</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, (m) => `<ul>${m}</ul>`)
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="#" style="color:#818cf8">$1</a>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

// --- Search ---

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.toLowerCase();
});

// --- Init ---

window.addEventListener('resize', resize);
resize();
loadData();
</script>
</body>
</html>
